<!DOCTYPE html>
<html lang="no">
<head>

  <title>Om oss</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 40px;
      color: #222;
    }

    h1 {
      text-align: center;
      margin-bottom: 50px;
    }

    .video-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .video-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 320px;
      text-align: center;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      color: #0077b5;
      font-weight: bold;
      text-decoration: none;
      font-size: 18px;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1>Mine Videoer</h1>

  <div class="video-container">

    <div class="video-card">
      <video controls>
        <source src="InternOyvind.mp4" type="video/mp4">

        LinkedIn Profil Øyvind
      </a>
    </div>
